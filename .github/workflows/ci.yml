name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-checks:
    name: Python Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt \
                      -r agent/requirements.txt \
                      -r requirements-dev.txt

      - name: Check formatting (black)
        run: ./scripts/format-python.sh

      - name: Lint (flake8 + pylint)
        run: ./scripts/lint-python.sh

      - name: Security scan (bandit)
        run: ./scripts/security-python.sh

      - name: Unit tests with coverage
        run: ./scripts/test-backend.sh
        env:
          BYPASS_AUTH: "true"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage/backend/

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/backend/coverage.json ]; then
            python3 << 'PYEOF'
          import json, os

          with open("coverage/backend/coverage.json") as f:
              data = json.load(f)

          backend_stmts = backend_miss = 0
          agent_stmts = agent_miss = 0
          for path, info in data["files"].items():
              s = info["summary"]
              if path.startswith("agent/"):
                  agent_stmts += s["num_statements"]
                  agent_miss += s["missing_lines"]
              else:
                  backend_stmts += s["num_statements"]
                  backend_miss += s["missing_lines"]

          def pct(stmts, miss):
              return ((stmts - miss) / stmts * 100) if stmts else 0

          total = data["totals"]
          lines = [
              "## Python Test Coverage",
              "",
              "| Component | Covered / Total | Percent |",
              "|-----------|-----------------|---------|",
              f"| Backend (backend/app) | {backend_stmts - backend_miss}/{backend_stmts} | {pct(backend_stmts, backend_miss):.1f}% |",
              f"| Host Daemon (agent) | {agent_stmts - agent_miss}/{agent_stmts} | {pct(agent_stmts, agent_miss):.1f}% |",
              f"| **Total** | **{total['covered_lines']}/{total['num_statements']}** | **{total['percent_covered']:.1f}%** |",
              "",
              "> Frontend has no test suite yet.",
          ]
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(summary_path, "a") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF
          fi

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Check formatting (prettier)
        run: ./scripts/format-frontend.sh

      - name: Lint (eslint)
        run: ./scripts/lint-frontend.sh

      - name: Type check (tsc)
        run: ./scripts/typecheck-frontend.sh

      - name: Build
        run: ./scripts/build-frontend.sh

      - name: Security audit (npm audit)
        run: ./scripts/security-frontend.sh
        continue-on-error: true

  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: python-checks
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt \
                      -r agent/requirements.txt \
                      -r requirements-dev.txt

      - name: Run E2E tests
        run: ./scripts/test-e2e.sh
        env:
          BYPASS_AUTH: "true"

  container-builds:
    name: Container Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend container
        run: |
          podman build --no-cache -t agent-dashboard-backend \
            -f backend/Containerfile backend/

      - name: Build frontend container
        run: |
          podman build --no-cache -t agent-dashboard-frontend \
            -f frontend/Containerfile frontend/

      - name: Build agent daemon container
        run: |
          podman build --no-cache -t agent-dashboard-daemon \
            -f agent/Containerfile agent/
        timeout-minutes: 15
