# Gemini CLI agent profile
# SUNSET: Gemini CLI stopped serving requests for free/
# personal users on June 18, 2026. Enterprise API key
# users (Gemini Code Assist Standard/Enterprise) retain
# access. Google's replacement is Antigravity CLI (agy).
# See agy.yaml and issue #65 for agy integration status.
name: gemini
display_name: Gemini
color: blue
binary: gemini

commands:
  new: ["gemini"]
  resume: ["bash", "-c", "gemini --resume latest || gemini"]

# Gemini uses its own telemetry implementation and does
# NOT honor OTEL_RESOURCE_ATTRIBUTES. The daemon's
# _resolve_agent_id() falls back to tool-type matching.
env:
  GEMINI_CLI_TELEMETRY_ENABLED: "true"
  GEMINI_TELEMETRY_ENABLED: "true"
  GEMINI_TELEMETRY_OTLP_ENDPOINT: "http://127.0.0.1:{otlp_port}"
  GEMINI_TELEMETRY_OTLP_PROTOCOL: "http"
  GEMINI_TELEMETRY_USE_COLLECTOR: "true"
  GEMINI_TELEMETRY_TARGET: "local"

# No auth gate — Gemini CLI supports both API key
# (GEMINI_API_KEY) and Google OAuth (gemini auth login).
# The daemon can't detect OAuth credentials, so we let
# the binary's presence be sufficient. If the user isn't
# authenticated, Gemini itself will prompt.

mcp:
  user_files:
    - ~/.gemini/settings.json

telemetry:
  token_metrics:
    - gemini_cli.token.usage
  activity_metrics:
    - gemini_cli.tool.call.count
    - gemini_cli.tool.call.latency
  runtime_metric:
    name: gemini_cli.agent.duration
    unit: milliseconds
  # Gemini also emits gen_ai.client.token.usage with
  # identical values — excluded to avoid double-counting.
  excluded_metrics:
    - gen_ai.client.token.usage

permission_patterns:
  - "Allow .+ to run"
  - "Do you want to allow"

# Build-time provisioning metadata
provisioning:
  install:
    npm:
      - "@google/gemini-cli"
  config_files:
    - path: "/root/.gemini/settings.json"
      content: >-
        {"security":{"auth":{"selectedType":"gemini-api"}}}
  verify: "gemini --version"
  mounts:
    - host: "~/.gemini"
      container: "/root/.gemini"
      mode: rw
  passthrough_env:
    - GEMINI_API_KEY
