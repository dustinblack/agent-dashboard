[tool.black]
line-length = 88
target-version = ["py39"]

[tool.pylint.main]
ignore-paths = ["frontend", ".venv", "node_modules"]

[tool.pylint.format]
max-line-length = 88

[tool.pylint."messages control"]
# Disabled checks that require architectural refactoring:
# - too-many-*: host_daemon.py has large handler methods
# - too-few-public-methods: SQLAlchemy ORM models
# - unused-argument: Socket.IO handlers require sid; FastAPI
#   deps require user for auth enforcement
# - broad-exception-caught: daemon needs resilient catch-all
# - raise-missing-from: FastAPI HTTPException re-raises
# - no-else-return: stylistic preference
# - import-outside-toplevel: deferred imports in handlers
# - attribute-defined-outside-init: daemon tasks created in run()
# - too-many-nested-blocks: OTLP parsing has deep nesting
disable = [
    "too-many-locals",
    "too-many-branches",
    "too-many-statements",
    "too-many-nested-blocks",
    "too-few-public-methods",
    "unused-argument",
    "broad-exception-caught",
    "raise-missing-from",
    "no-else-return",
    "import-outside-toplevel",
    "attribute-defined-outside-init",
    "too-many-lines",
    "too-many-instance-attributes",
    "too-many-arguments",
    "too-many-positional-arguments",
]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
python_files = ["test_*.py"]
addopts = "-v"
