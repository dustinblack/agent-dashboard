version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Containerfile
    ports:
      - "8000:8000"
    volumes:
      - dashboard_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/agent_dashboard.db
      - BYPASS_AUTH=true
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Containerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    # Environment variables for build time would be passed here if needed

volumes:
  dashboard_data:
