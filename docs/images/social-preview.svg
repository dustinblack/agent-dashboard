<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0B0E14"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.5"/>

  <!-- Hex glow behind logo -->
  <circle cx="640" cy="240" r="120" fill="#39FF14" opacity="0.03"/>
  <circle cx="640" cy="240" r="80" fill="#39FF14" opacity="0.04"/>

  <!-- Logo (scaled from 48x48 to ~120x120, centered at 640,240) -->
  <g transform="translate(580, 180) scale(2.5)">
    <!-- Hexagon Frame -->
    <path d="M24 4L41.3205 14V34L24 44L6.67949 34V14L24 4Z" stroke="#39FF14" stroke-width="2.5" fill="none"/>
    <!-- Prompt Arrow -->
    <path d="M16 24L21 20L16 16" stroke="#39FF14" stroke-width="3" stroke-linecap="round" transform="translate(0, 4)"/>
    <!-- Cursor (static for preview) -->
    <rect x="23" y="27" width="9" height="3" fill="#39FF14"/>
  </g>

  <!-- Title -->
  <text x="640" y="380" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace"
        font-size="52" font-weight="700" fill="#f1f5f9" letter-spacing="-1">
    Agent Dashboard
  </text>

  <!-- Tagline -->
  <text x="640" y="430" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace"
        font-size="20" fill="#64748b">
    Orchestrate AI coding agents across multiple machines
  </text>

  <!-- Tool badges -->
  <g transform="translate(445, 470)">
    <!-- Claude badge -->
    <rect x="0" y="0" width="100" height="32" rx="6" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="50" y="21" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
          font-size="14" font-weight="600" fill="#a78bfa">
      Claude
    </text>

    <!-- Gemini badge -->
    <rect x="120" y="0" width="100" height="32" rx="6" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>
    <text x="170" y="21" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
          font-size="14" font-weight="600" fill="#60a5fa">
      Gemini
    </text>

    <!-- Bash badge -->
    <rect x="240" y="0" width="100" height="32" rx="6" fill="#64748b" opacity="0.2" stroke="#64748b" stroke-opacity="0.4" stroke-width="1"/>
    <text x="290" y="21" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
          font-size="14" font-weight="600" fill="#94a3b8">
      Bash
    </text>

    <!-- OTel badge -->
    <rect x="360" y="0" width="100" height="32" rx="6" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="410" y="21" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
          font-size="14" font-weight="600" fill="#fbbf24">
      OpenTelemetry
    </text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="632" width="1280" height="8" fill="#39FF14" opacity="0.6"/>
</svg>
